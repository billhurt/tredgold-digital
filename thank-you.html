<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Tredgold Digital Ltd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --mid: #888;
      --border: #222;
    }

    html, body { height: 100%; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      cursor: crosshair;
      overflow: hidden;
    }

    /* noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      z-index: 1;
    }

    /* left panel */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 4rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4.5rem, 10vw, 10rem);
      line-height: 0.88;
      letter-spacing: -0.01em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.8s 0.35s forwards;
    }

    /* right panel */
    .panel-right {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 4rem;
    }

    .message {
      opacity: 0;
      animation: fadeUp 0.8s 0.55s forwards;
    }

    .message p {
      font-size: 1rem;
      color: var(--mid);
      line-height: 1.8;
      max-width: 38ch;
    }

    .message p + p { margin-top: 1rem; }

    .actions {
      margin-top: 2.8rem;
      display: flex;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.75s forwards;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--white);
      color: var(--black);
      background: var(--white);
      transition: background 0.22s, color 0.22s;
    }

    .btn:hover { background: transparent; color: var(--white); }

    .btn-ghost {
      background: transparent;
      color: var(--white);
    }

    .btn-ghost:hover { background: var(--white); color: var(--black); }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1.4rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      border-top: 1px solid var(--border);
      z-index: 10;
    }

    /* ── COUNTER ── */
    .counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--mid);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.4rem; }
      main {
        grid-template-columns: 1fr;
        overflow-y: auto;
        height: auto;
        min-height: 100vh;
      }
      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 8rem 1.4rem 3rem;
      }
      .panel-right { padding: 3rem 1.4rem 6rem; }
      footer { padding: 1.2rem 1.4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">TD</a>
  </nav>

  <main>
    <div class="panel-left">
      <p class="eyebrow">Form Submitted</p>
      <h1>Thank<br>You.</h1>
    </div>

    <div class="panel-right">
      <div class="message">
        <p>Your message has landed. We'll review it and come back to you within one business day.</p>
      </div>
      <div class="actions">
        <a href="/" class="btn">Back to Home</a>
        <a href="/#services" class="btn btn-ghost">Our Services</a>
      </div>
    </div>
  </main>

  <footer>
    <span>Tredgold Digital Ltd</span>
    <span class="counter" id="counter">Redirecting in <span id="secs">10</span>s</span>
    <span>© <span id="yr"></span></span>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Countdown redirect
    let t = 10;
    const secsEl = document.getElementById('secs');
    const interval = setInterval(() => {
      t--;
      secsEl.textContent = t;
      if (t <= 0) {
        clearInterval(interval);
        window.location.href = '/';
      }
    }, 1000);
  </script>

</body>
</html>
